name: Deploy to GitHub Pages

# Publishes the static site to GitHub Pages on every push to master.
on:
  push:
    branches: [master]
  workflow_dispatch:

# Permissions required by the Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Auto-enables Pages (source = GitHub Actions) if not already configured.
      # enablement: true creates the Pages site on first run via the API,
      # so no manual Settings → Pages toggle is needed.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # The whole repo root is the static site (index.html lives at root).
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
