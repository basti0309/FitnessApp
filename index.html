<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f1115">
  <title>WOD Box — CrossFit Logger &amp; Timer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <h1 class="brand"><span class="brand-mark">▣</span> WOD Box</h1>
    <p class="tagline">Log your WODs · Run your clock</p>
  </header>

  <nav class="tabbar" role="tablist">
    <button class="tab is-active" data-tab="timer" role="tab">Timer</button>
    <button class="tab" data-tab="log" role="tab">Log WOD</button>
    <button class="tab" data-tab="history" role="tab">History</button>
  </nav>

  <main class="container">

    <!-- ============ TIMER ============ -->
    <section id="tab-timer" class="panel is-active">
      <div class="seg" id="timerModes">
        <button class="seg-btn is-active" data-mode="tabata">Tabata</button>
        <button class="seg-btn" data-mode="amrap">AMRAP</button>
        <button class="seg-btn" data-mode="fortime">For Time</button>
      </div>

      <!-- mode settings -->
      <div class="settings" id="setTabata">
        <label>Rounds<input type="number" id="tabRounds" value="8" min="1" max="99"></label>
        <label>Work (s)<input type="number" id="tabWork" value="20" min="1" max="600"></label>
        <label>Rest (s)<input type="number" id="tabRest" value="10" min="0" max="600"></label>
      </div>
      <div class="settings hidden" id="setAmrap">
        <label>Minutes<input type="number" id="amrapMin" value="12" min="1" max="180"></label>
        <label>Seconds<input type="number" id="amrapSec" value="0" min="0" max="59"></label>
      </div>
      <div class="settings hidden" id="setFortime">
        <label>Time cap (min, 0 = none)<input type="number" id="capMin" value="0" min="0" max="180"></label>
      </div>

      <div class="clock-card" id="clockCard">
        <div class="phase-label" id="phaseLabel">READY</div>
        <div class="clock" id="clockDisplay">00:00</div>
        <div class="round-label" id="roundLabel"></div>
      </div>

      <div class="controls">
        <button class="btn btn-primary" id="startPauseBtn">Start</button>
        <button class="btn btn-ghost" id="resetBtn">Reset</button>
        <button class="btn btn-ghost" id="muteBtn" title="Toggle sound">🔊</button>
      </div>

      <button class="btn btn-link" id="logResultBtn" hidden>Log this result →</button>
    </section>

    <!-- ============ LOG ============ -->
    <section id="tab-log" class="panel">
      <form id="logForm" class="card form">
        <h2>Log a WOD</h2>
        <label>Date<input type="date" id="fDate" required></label>
        <label>WOD name<input type="text" id="fName" placeholder="e.g. Fran, Cindy, Murph" required></label>

        <label>Type
          <select id="fType">
            <option value="fortime">For Time</option>
            <option value="amrap">AMRAP</option>
            <option value="tabata">Tabata</option>
          </select>
        </label>

        <!-- For Time result -->
        <div class="result-fields" data-for="fortime">
          <label>Result time<input type="text" id="rFortime" placeholder="mm:ss e.g. 8:42"></label>
        </div>
        <!-- AMRAP result -->
        <div class="result-fields hidden" data-for="amrap">
          <div class="row">
            <label>Rounds<input type="number" id="rRounds" min="0" placeholder="0"></label>
            <label>+ Reps<input type="number" id="rReps" min="0" placeholder="0"></label>
          </div>
        </div>
        <!-- Tabata result -->
        <div class="result-fields hidden" data-for="tabata">
          <label>Score (total reps / lowest round)<input type="text" id="rTabata" placeholder="e.g. 96 total / 11 low"></label>
        </div>

        <label>Notes<textarea id="fNotes" rows="2" placeholder="Weights, scaling, how it felt…"></textarea></label>
        <button type="submit" class="btn btn-primary">Save WOD</button>
      </form>
    </section>

    <!-- ============ HISTORY ============ -->
    <section id="tab-history" class="panel">
      <div class="history-head">
        <h2>History</h2>
        <span class="muted" id="histCount"></span>
      </div>
      <ul class="wod-list" id="wodList"></ul>
      <p class="empty" id="emptyHistory">No WODs logged yet. Go crush one. 💪</p>
    </section>

  </main>

  <script src="js/audio.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/log.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
